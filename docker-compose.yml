services:
  mongodb:
    image: mongo:7
    container_name: cronos-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: cronos-ai
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cronos-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: cronos-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cronos-app
    ports:
      - "3333:3333"
    environment:
      NODE_ENV: DEV
      PORT: 3333
      DATABASE_URL: mongodb://mongodb:27017/cronos-ai
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: cronos-ai-resources
      MINIO_USE_SSL: "false"
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: resources
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy

volumes:
  mongodb_data:
  minio_data:
  qdrant_data:
